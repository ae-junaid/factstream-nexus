<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ConflictMonitor — Real-Time Global Conflict & OSINT Dashboard</title>
    <meta name="description" content="Live global conflict monitoring dashboard tracking wars, crises & geopolitical events with OSINT data from GDELT, ACLED, OpenSky. Unbiased, fact-based intelligence on Ukraine, Gaza, Sudan, Yemen & more." />
    <meta name="keywords" content="conflict monitor, OSINT dashboard, global conflicts, war tracker, geopolitical intelligence, Ukraine war, Gaza conflict, Sudan crisis, Yemen Red Sea, real-time news, open source intelligence, GDELT, ACLED" />
    <meta name="author" content="ConflictMonitor" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://conflictsmonitor.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ConflictMonitor" />
    <meta property="og:title" content="ConflictMonitor — Real-Time Global Conflict & OSINT Dashboard" />
    <meta property="og:description" content="Track global conflicts in real time with unbiased OSINT intelligence. Live maps, threat assessments, and verified news from trusted sources." />
    <meta property="og:url" content="https://conflictsmonitor.com" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ConflictMonitor — Real-Time Global Conflict Dashboard" />
    <meta name="twitter:description" content="Live OSINT dashboard tracking global conflicts, wars & geopolitical crises with verified, unbiased intelligence." />

    <!-- Theme & Favicon -->
    <meta name="theme-color" content="#0a0e1a" />
    <link rel="icon" href="/favicon.ico" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ConflictMonitor",
      "url": "https://conflictsmonitor.com",
      "description": "Real-time global conflict monitoring dashboard with open source intelligence. Tracks wars, crises and geopolitical events with unbiased, fact-based reporting.",
      "applicationCategory": "NewsApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "ConflictMonitor"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
